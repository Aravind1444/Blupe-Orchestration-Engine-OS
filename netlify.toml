[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "DB_ENDPOINT,PASSDB,SMTP_USER,SMTP_HOST,SUPABASE_SERVICE_KEY,SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,GEMINI_API_KEY,SECRETS_MASTER_KEY"

[dev]
  command = "npm run dev"
  targetPort = 3001
  port = 8888
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  # Use esbuild for better Node.js module support
  node_bundler = "esbuild"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/llm"
  to = "/.netlify/functions/llm"
  status = 200

[[redirects]]
  from = "/api/email"
  to = "/.netlify/functions/email"
  status = 200

