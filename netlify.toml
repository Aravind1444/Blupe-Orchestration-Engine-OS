# Static assets - serve directly without SPA fallback
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Favicons and manifest files
[[redirects]]
  from = "/*.ico"
  to = "/:splat.ico"
  status = 200

[[redirects]]
  from = "/*.png"
  to = "/:splat.png"
  status = 200

[[redirects]]
  from = "/*.svg"
  to = "/:splat.svg"
  status = 200

[[redirects]]
  from = "/*.webmanifest"
  to = "/:splat.webmanifest"
  status = 200

# SPA fallback - serve index.html for all routes (frontend routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
