    body {

    /* React Flow Overrides */
    .react-flow__node {
      border-radius: 12px;
      border: none;
    }

    .react-flow__handle {
      width: 8px;
      height: 8px;
      background: #94a3b8;
      border: 2px solid #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;

    .react-flow__handle:hover {
      background: #6366f1;
      width: 10px;
      height: 10px;
      border-color: #6366f1;
    }

    .react-flow__edge-path {
      stroke: #94a3b8;
      stroke-width: 2;
    }

    .react-flow__connection-path {
      stroke: #6366f1;
      stroke-width: 2;
    }

    .react-flow__controls {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      border: 1px solid #e2e8f0;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      padding: 4px;
      color: #475569;
    }

    .react-flow__controls-button {
      border: none;
      background: transparent;
      fill: #64748b;
      margin-bottom: 2px;
      border-radius: 4px;
    }

    .react-flow__controls-button:hover {
      background: #f1f5f9;
      fill: #0f172a;
    }

    .react-flow__attribution {
      display: none;
    }

    .react-flow__panel {

    }
